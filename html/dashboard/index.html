<!DOCTYPE html>
<html>
<head>
  <title>Weather</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <div class="dashboard">
    <h1><span id="station"></span> <span id="datum"></span></h1>
    <select id="stationSelect"></select>
    
    <div class="card-row">
      <div class="card">
        <p class="label">Tijd</p>
        <p id="tijd" class="value"></p>
      </div>

      <div class="card">
        <p class="label">Temperatuur °C</p>
        <p id="temp" class="value"></p>
      </div>

      <div class="card">
        <p class="label">Luchtvochtigheid %</p>
        <p id="humidity" class="value"></p>
      </div>

      <div class="card">
        <p class="label">Luchtdruk hPa</p>
        <p id="pressure" class="value"></p>
      </div>
    </div>

    <div class="big-card">
      <h1 id="description"></h1>
    </div>
    
  </div>

  <script>
    function updateDashboard(station) {
      const date = new Date(station.timestamp);
      document.getElementById("datum").textContent = date.toLocaleDateString("nl-NL", {day:"numeric", month:"long", year:"numeric"})
      document.getElementById("tijd").textContent = date.toLocaleTimeString();
      document.getElementById("station").textContent = station.stationname.replace("Meetstation", "");
      document.getElementById("temp").textContent = station.temperature + " °C";
      document.getElementById("humidity").textContent = station.humidity + " %";
      if (station.airpressure) {
        document.getElementById("pressure").textContent = station.airpressure + " hPa";
      } else {
        document.getElementById("pressure").textContent = "---";
      };
    };

      let stations = [];
      fetch("https://data.buienradar.nl/2.0/feed/json")
        .then(response => response.json())
        .then(data => {
          stations = data.actual.stationmeasurements;
          document.getElementById("description").textContent = data.forecast.weatherreport.summary;

        stations.forEach(station => {
          const option = document.createElement("option");
          option.value = station.stationid;
          option.textContent = station.stationname.replace("Meetstation", "");
          document.getElementById("stationSelect").appendChild(option);
        });
        updateDashboard(stations[0]);
      });

    document.getElementById("stationSelect").addEventListener("change", () => {
      const gekozenId = document.getElementById("stationSelect").value;
      const gekozenStation = stations.find(s => s.stationid == gekozenId);
      updateDashboard(gekozenStation);
});

  </script>
</body>
</html>
